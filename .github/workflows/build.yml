name: Build Windows Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Miroo NFT Tools
      uses: actions/checkout@v4
    
    - name: Clean cache (force fresh build)
      run: |
        Remove-Item -Recurse -Force node_modules -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force release -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
        Write-Output "✓ Cleaned all caches"
      shell: pwsh
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Update version in package.json
      run: |
        $version = "2.0.${{ github.run_number }}"
        $json = Get-Content package.json -Raw | ConvertFrom-Json
        $json.version = $version
        $json | ConvertTo-Json -Depth 10 | Set-Content package.json
        Write-Output "Updated version to $version"
      shell: pwsh
        
    - name: Install Electron dependencies
      run: npm install
      
    - name: Build Electron installer
      run: npm run build:win
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Upload installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: Miroo-NFT-Tools-Setup
        path: release/*.exe
        
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.0.${{ github.run_number }}
        name: Miroo NFT Tools v2.0.${{ github.run_number }}
        files: release/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
